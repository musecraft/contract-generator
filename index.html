<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Генерация договора</title>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      max-width: 700px;
      margin: 0 auto;
    }

    h2 {
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hint {
      margin-top: 18px;
      color: #555;
      font-size: 13px;
      line-height: 1.4;
    }

    .error {
      color: #b00020;
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Генерация договора PDF</h2>

  <div class="field">
    <input id="file" type="file" accept="application/pdf" />
  </div>

  <div class="field">
    <input id="name" placeholder="ФИО" />
  </div>

  <div class="field">
    <input id="passport" placeholder="Паспорт / документ" />
  </div>

  <div class="field">
    <input id="address" placeholder="Адрес" />
  </div>

  <div class="field">
    <input id="phone" placeholder="Телефон" />
  </div>

  <div class="field">
    <input id="email" placeholder="Email" />
  </div>

  <div class="field">
    <input id="total" placeholder="Сумма" />
  </div>

  <div class="field">
    <input id="date" placeholder="Дата" />
  </div>

  <button onclick="generate()">Создать PDF</button>

  <div class="hint">
    Если текст попадает не туда, меняй значения x и y в объекте FIELD_POSITIONS.
  </div>

  <div id="error" class="error"></div>

  <script>
    const FIELD_POSITIONS = {
      name:     { x: 300, y: 130, size: 11 },
      passport: { x: 120, y: 660, size: 12 },
      address:  { x: 120, y: 630, size: 12 },
      phone:    { x: 120, y: 600, size: 12 },
      email:    { x: 120, y: 570, size: 12 },
      total:    { x: 420, y: 230, size: 11 },
      date:     { x: 200 , y: 140, size: 11 }
    };

    async function generate() {
      const errorBox = document.getElementById('error');
      errorBox.textContent = '';

      try {
        const file = document.getElementById('file').files[0];
        if (!file) {
          throw new Error('Сначала загрузи PDF-шаблон.');
        }

        const name = document.getElementById('name').value.trim();
        const passport = document.getElementById('passport').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const total = document.getElementById('total').value.trim();
        const date = document.getElementById('date').value.trim();

        const inputPdfBytes = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(inputPdfBytes);

        pdfDoc.registerFontkit(fontkit);

        const fontResponse = await fetch('Carlito-Regular.ttf');
        if (!fontResponse.ok) {
          throw new Error('Не найден файл Carlito-Regular.ttf');
        }

        const fontBytes = await fontResponse.arrayBuffer();
        const font = await pdfDoc.embedFont(fontBytes);

        const pages = pdfDoc.getPages();
        if (!pages.length) {
          throw new Error('PDF не содержит страниц.');
        }

        const page = pages[0];
        const pageHeight = page.getHeight();

        drawField(page, font, name, FIELD_POSITIONS.name, pageHeight);
        drawField(page, font, passport, FIELD_POSITIONS.passport, pageHeight);
        drawField(page, font, address, FIELD_POSITIONS.address, pageHeight);
        drawField(page, font, phone, FIELD_POSITIONS.phone, pageHeight);
        drawField(page, font, email, FIELD_POSITIONS.email, pageHeight);
        drawField(page, font, total, FIELD_POSITIONS.total, pageHeight);
        drawField(page, font, date, FIELD_POSITIONS.date, pageHeight);

        const outputPdfBytes = await pdfDoc.save();

        const blob = new Blob([outputPdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = buildFileName(name, date);
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (error) {
        console.error(error);
        errorBox.textContent = 'Ошибка: ' + error.message;
      }
    }

    function drawField(page, font, text, config, pageHeight) {
      if (!text) return;

      page.drawText(text, {
        x: config.x,
        y: pageHeight - config.y,
        size: config.size || 12,
        font: font
      });
    }

    function buildFileName(name, date) {
      const safeName = (name || 'contract').replace(/[\\/:*?"<>|]/g, '_');
      const safeDate = (date || '').replace(/[\\/:*?"<>|]/g, '_');

      if (safeDate) {
        return 'Договор - ' + safeName + ' - ' + safeDate + '.pdf';
      }

      return 'Договор - ' + safeName + '.pdf';
    }
  </script>
</body>
</html>
